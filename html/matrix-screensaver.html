<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Matrix Screensaver HTML</title>
  <style>
    html, body { margin:0; width:100%; height:100%; overflow:hidden; background:#000; }
    #bg { position:fixed; inset:0; width:100%; height:100%; object-fit:cover; filter:contrast(1.08) brightness(.75); }
    #matrix { position:fixed; inset:0; width:100%; height:100%; }
    #scanlines { position:fixed; inset:0; pointer-events:none; background:repeating-linear-gradient(to bottom, rgba(0,0,0,.20) 0px, rgba(0,0,0,.20) 1px, transparent 1px, transparent 4px); mix-blend-mode:multiply; }
    #vignette { position:fixed; inset:0; pointer-events:none; background:radial-gradient(circle at center, transparent 45%, rgba(0,0,0,.75)); }
    #panel { position:fixed; left:16px; bottom:16px; color:#bfffd6; font-family:Consolas,monospace; font-size:12px; opacity:.65; }
  </style>
</head>
<body>
  <img id="bg" src="https://images.unsplash.com/photo-1518709268805-4e9042af2176?auto=format&fit=crop&w=1920&q=80" />
  <canvas id="matrix"></canvas>
  <div id="scanlines"></div>
  <div id="vignette"></div>
  <div id="panel">Matrix HTML ŌĆö modifie CONFIG dans le fichier</div>

<script>
const CONFIG = {
  glyphColor: '#00FF66',
  headColor: '#EAFFF0',
  fontSize: 22,
  speed: 1.25,
  density: 0.88,
  alphabet: 'Demon',
  backgrounds: [],
  changeIntervalSeconds: 30
};

const alphabets = {
  Katakana: 'ŃéóŃéżŃé”Ńé©Ńé¬Ńé½ŃéŁŃé»Ńé▒Ńé│ŃéĄŃéĘŃé╣Ńé╗ŃéĮŃé┐ŃāüŃāäŃāåŃāłŃāŖŃāŗŃāīŃāŹŃāÄŃā×Ńā¤ŃāĀŃāĪŃāóŃāżŃā”Ńā©Ńā®Ńā¬Ńā½Ńā¼ŃāŁŃā»Ńā│0123456789',
  Hex: '0123456789ABCDEF',
  Binary: '01',
  Runes: 'ßÜĀßÜóßÜ”ßÜ©ßÜ▒ßÜ▓ßÜĘßÜ╣ßÜ║ßÜŠßøüßøāßøćßøłßøēßøŖßøÅßøÆßø¢ßøŚßøÜßø£ßø¤ßø×',
  Demon: 'ŌśĀŌø¦ŌśźŌĆĀŌĆĪŌĆ╗ŌŚ¼ŌŚłŌŚćŌŚåŌ¤ĪŌ¤ÉŌ¤üŌ¦½0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZ'
};

const canvas = document.getElementById('matrix');
const ctx = canvas.getContext('2d');
let columns = [];
let last = performance.now();

function resize() {
  canvas.width = innerWidth * devicePixelRatio;
  canvas.height = innerHeight * devicePixelRatio;
  canvas.style.width = innerWidth + 'px';
  canvas.style.height = innerHeight + 'px';
  ctx.setTransform(devicePixelRatio,0,0,devicePixelRatio,0,0);
  const count = Math.floor(innerWidth / CONFIG.fontSize);
  columns = Array.from({length: count}, (_, i) => ({
    x: i * CONFIG.fontSize,
    y: Math.random() * -innerHeight,
    length: 8 + Math.floor(Math.random() * 32),
    speed: (70 + Math.random() * 210) * CONFIG.speed,
    active: Math.random() <= CONFIG.density
  }));
}

function glyph() {
  const a = alphabets[CONFIG.alphabet] || alphabets.Katakana;
  return a[Math.floor(Math.random() * a.length)];
}

function draw(now) {
  const dt = Math.min(.05, (now - last) / 1000);
  last = now;
  ctx.fillStyle = 'rgba(0,0,0,0.08)';
  ctx.fillRect(0,0,innerWidth,innerHeight);
  ctx.font = `bold ${CONFIG.fontSize}px Consolas, monospace`;
  ctx.shadowColor = CONFIG.glyphColor;
  ctx.shadowBlur = 12;

  for (const c of columns) {
    if (!c.active) continue;
    c.y += c.speed * dt;
    if (c.y - c.length * CONFIG.fontSize > innerHeight) {
      c.y = -Math.random() * 400;
      c.length = 8 + Math.floor(Math.random() * 32);
      c.speed = (70 + Math.random() * 210) * CONFIG.speed;
    }
    for (let i=0;i<c.length;i++) {
      const y = c.y - i * CONFIG.fontSize;
      if (y < -CONFIG.fontSize || y > innerHeight + CONFIG.fontSize) continue;
      const alpha = i === 0 ? 1 : Math.max(.05, 1 - i / c.length);
      ctx.fillStyle = i === 0 ? CONFIG.headColor : hexToRgba(CONFIG.glyphColor, alpha);
      ctx.fillText(glyph(), c.x, y);
    }
  }
  requestAnimationFrame(draw);
}

function hexToRgba(hex, alpha) {
  const v = hex.replace('#','');
  const r = parseInt(v.slice(0,2),16), g = parseInt(v.slice(2,4),16), b = parseInt(v.slice(4,6),16);
  return `rgba(${r},${g},${b},${alpha})`;
}

addEventListener('resize', resize);
resize();
requestAnimationFrame(draw);
</script>
</body>
</html>
